name: "Label Fixed Issues"

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  label-issues:
    name: "Add 'fixed in develop' label to referenced issues"
    runs-on: ubuntu-latest
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    steps:
      - name: Extract issue numbers from PR
        id: extract_issues
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const combinedText = `${prTitle}\n${prBody}`;

            // Match patterns like "fixes #123", "closes #456",
            // "resolves #789", "#123", etc.
            // This regex matches common GitHub issue reference patterns
            const issueRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:erence)?|see|issue)\s*[:#]?\s*(\d+)|#(\d+)/gi;
            const matches = [...combinedText.matchAll(issueRegex)];

            // Extract unique issue numbers
            const issueNumbers = [...new Set(matches.map(match => match[1] || match[2]))];

            console.log(`Found issue references: ${issueNumbers.join(', ')}`);
            return issueNumbers;

      - name: Add label to issues
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumbers = ${{ steps.extract_issues.outputs.result }};

            if (!issueNumbers || issueNumbers.length === 0) {
              console.log('No issues found to label');
              return;
            }

            const label = 'fixed in develop';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const issueNumber of issueNumbers) {
              try {
                // First, ensure the label exists in the repository
                try {
                  await github.rest.issues.getLabel({
                    owner,
                    repo,
                    name: label,
                  });
                } catch (error) {
                  if (error.status === 404) {
                    // Create the label if it doesn't exist
                    await github.rest.issues.createLabel({
                      owner,
                      repo,
                      name: label,
                      color: '0E8A16', // Green color
                      description: 'Issue has been fixed in the develop branch',
                    });
                    console.log(`Created label: ${label}`);
                  } else {
                    // Log other errors but continue
                    console.warn(`Warning checking label: ${error.message}`);
                  }
                }

                // Add the label to the issue
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: parseInt(issueNumber),
                  labels: [label],
                });

                console.log(`Added '${label}' label to issue #${issueNumber}`);
              } catch (error) {
                const msg = `Failed to label issue #${issueNumber}`;
                console.error(`${msg}: ${error.message}`);
              }
            }
