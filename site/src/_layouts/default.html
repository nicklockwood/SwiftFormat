<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ '/assets/preview.png' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/preview.png' | absolute_url }}">
  <link rel="icon" href="{{ '/assets/icon.png' | relative_url }}" type="image/png">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include navigation.html %}
  <div class="page" id="page">
    <aside class="toc-sidebar{% if page.toc_style == 'flat' %} toc-flat{% endif %}" id="toc-sidebar" aria-label="Table of contents"></aside>
    <main class="content">
      {{ content }}
      <footer class="site-footer">
        {% if page.is_develop %}
          SwiftFormat develop branch <span class="nav-separator">·</span> last updated {{ site.data.develop.updated }}
        {% else %}
          SwiftFormat {{ site.data.build.version }} <span class="nav-separator">·</span> last updated {{ site.data.build.updated }}
        {% endif %}
      </footer>
    </main>
  </div>
  <script>
    function updateNavHeight() {
      const nav = document.querySelector('.top-nav');
      document.documentElement.style.setProperty('--nav-height', nav.offsetHeight + 'px');
    }
    updateNavHeight();
    window.addEventListener('resize', updateNavHeight);

    // Move the kramdown-generated table of contents into the sidebar. If the
    // page has no TOC, collapse the sidebar so the content spans full width.
    (function () {
      const toc = document.getElementById('markdown-toc');
      const sidebar = document.getElementById('toc-sidebar');
      if (!toc) {
        document.getElementById('page').classList.add('no-toc');
        const noToggle = document.getElementById('toc-toggle');
        if (noToggle) noToggle.style.display = 'none';
        return;
      }
      sidebar.appendChild(toc);

      // Highlight the TOC entry that matches the current URL fragment.
      function syncActiveTocEntry() {
        toc.querySelectorAll('a.active').forEach(function (a) {
          a.classList.remove('active');
        });
        if (!location.hash) return;
        const current = toc.querySelector('a[href="' + location.hash + '"]');
        if (current) current.classList.add('active');
      }
      syncActiveTocEntry();
      window.addEventListener('hashchange', syncActiveTocEntry);

      // Mobile: the "Contents" button toggles the sidebar as a full-screen
      // overlay. Tapping an entry closes it so you land on the section.
      const toggle = document.getElementById('toc-toggle');
      if (toggle) {
        function setTocOpen(open) {
          document.body.classList.toggle('toc-open', open);
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          toggle.textContent = open ? 'Close' : 'Contents';
        }
        toggle.addEventListener('click', function () {
          setTocOpen(!document.body.classList.contains('toc-open'));
        });
        sidebar.addEventListener('click', function (event) {
          if (event.target.closest('a')) setTocOpen(false);
        });
      }
    })();

    // Wrap each table in a horizontally-scrollable container so wide tables
    // scroll on their own instead of forcing the whole page wider than the
    // viewport (which would break text wrapping on mobile).
    (function () {
      const tables = document.querySelectorAll('.content table');
      tables.forEach(function (table) {
        if (table.parentElement.classList.contains('table-scroll')) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'table-scroll';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
    })();

    // Wrap each heading's text in an anchor to its own id so the link can be
    // clicked to jump, or right-clicked to copy. kramdown already sets the ids.
    (function () {
      const headings = document.querySelectorAll('.content h1[id], .content h2[id], .content h3[id], .content h4[id], .content h5[id], .content h6[id]');
      headings.forEach(function (heading) {
        if (heading.querySelector('a')) return; // avoid nesting anchors
        const link = document.createElement('a');
        link.className = 'header-anchor';
        link.href = '#' + heading.id;
        while (heading.firstChild) {
          link.appendChild(heading.firstChild);
        }
        heading.appendChild(link);
      });
    })();
  </script>
</body>
</html>
